<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clusters</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="clusters.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-heading">Red Hat Workshop Management</h1>
    <img src="/hat-alone.png" alt="Red Hat" class="app-logo" />
  </header>
  <main class="clusters-main">
    <h2 class="page-title">Clusters</h2>
    <section class="clusters-name-section" aria-labelledby="clusters-name-label">
      <div id="clusters-name-form" class="clusters-name-row">
        <label id="clusters-name-label" class="cluster-credential-label" for="clusters-name-input">Name</label>
        <input type="text" id="clusters-name-input" class="clusters-name-input" placeholder="Your name" autocomplete="name" />
        <button type="button" id="clusters-name-reserve" class="clusters-name-reserve">Reserve</button>
      </div>
      <div id="clusters-name-display" class="clusters-name-row" style="display: none;">
        <span class="cluster-credential-label">Name</span>
        <input type="text" id="clusters-name-readonly" class="clusters-name-readonly" readonly />
      </div>
    </section>
    <p class="clusters-hint">Reserve a cluster by entering your name above.</p>
    <ul id="clusters-list" class="clusters-list" aria-label="Cluster list"></ul>
    <div id="clusters-workshop" class="clusters-workshop"></div>
    <p id="clusters-status" class="clusters-status" aria-live="polite"></p>
  </main>
  <script src="clusters.js"></script>
</body>
</html>
